<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Shapers Directory</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --border: #e2e8f0;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --radius-lg: 18px;
      --radius-full: 999px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
      --accent: #111827;
      --border-soft: #d1d5db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0;
    }

    .view-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .view-label {
      color: var(--text-muted);
    }

    .view-toggle-group {
      display: inline-flex;
      gap: 8px;
      padding: 3px;
      border-radius: 999px;
    }

    .toggle-btn {
      border: 1px solid var(--border-soft);
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      text-decoration: none;
      color: #111827;
    }

    .toggle-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .search-card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      padding: 20px 22px 18px;
      margin-bottom: 28px;
    }

    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-title-group h2 {
      margin: 0;
      font-size: 20px;
    }

    .search-title-group p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .search-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .search-count span {
      font-weight: 600;
      color: var(--text-main);
    }

    .filters-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 14px;
    }

    @media (max-width: 900px) {
      .filters-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .filters-row {
        grid-template-columns: 1fr;
      }
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .filter-input,
    .filter-select {
      padding: 10px 11px;
      font-size: 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      outline: none;
      background: #f9fafb;
    }

    .filter-footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-clear {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    @media (max-width: 1000px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .member-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 22px 22px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-wrapper {
      width: 96px;
      height: 96px;
      border-radius: var(--radius-full);
      overflow: hidden;
      border: 3px solid #e5edff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.12);
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .member-company {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .member-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .member-location {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn-view {
      border: none;
      border-radius: 999px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--primary);
      color: #ffffff;
    }

    .status {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 16px;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal-dialog {
    background: #ffffff;
    border-radius: 24px;
    max-width: 720px;
    width: min(720px, 100%);
    height: min(80vh, 620px);
    padding: 20px 24px 22px;
    box-shadow: 0 28px 70px rgba(15, 23, 42, 0.35);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    }

    .modal-close {
      position: absolute;
      right: 14px;
      top: 12px;
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      color: #9ca3af;
    }

    .modal-header {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-bottom: 14px;
    }

    .modal-avatar {
      width: 80px;
      height: 80px;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #e5edff;
      flex-shrink: 0;
    }

    .modal-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-info-primary h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .modal-info-primary p {
      margin: 2px 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .modal-body {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-main);
    flex: 1;
    overflow-y: auto;
    padding-right: 6px;
    }

    .modal-body::-webkit-scrollbar {
    width: 8px;
    }

    .modal-body::-webkit-scrollbar-track {
    background: #f1f5f9;
    border-radius: 999px;
    }

    .modal-body::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 999px;
    }

    .modal-body::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
    }

    .modal-section h4 {
      margin: 0 0 4px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Global Shapers HCMC Directory</h1>
      <div class="view-toggle">
        <span class="view-label">View:</span>
        <div class="view-toggle-group">
          <a class="toggle-btn active" href="index.html">Dashboard</a>
          <a class="toggle-btn" href="catalogue.html">Catalogue</a>
        </div>
      </div>
    </header>

    <section class="search-card">
      <div class="search-header">
        <div class="search-title-group">
          <h2>Search Members</h2>
          <p>Search and filter by name, role, organization, hub/location, etc.</p>
        </div>
        <div class="search-count">
          Showing <span id="visibleCount">0</span> of
          <span id="totalCount">0</span> members
        </div>
      </div>

      <div class="filters-row">
        <div class="filter-group">
          <span class="filter-label">Name</span>
          <input id="filterName" class="filter-input" type="text" placeholder="Search by name..." />
        </div>

        <div class="filter-group">
          <span class="filter-label">Role</span>
          <input id="filterRole" class="filter-input" type="text" placeholder="Search by role..." />
        </div>

        <div class="filter-group">
          <span class="filter-label">Organization</span>
          <input id="filterCompany" class="filter-input" type="text" placeholder="Search by Organization..." />
        </div>

        <div class="filter-group">
          <span class="filter-label">Hub / Location</span>
          <input id="filterLocation" class="filter-input" type="text" placeholder="Search by location..." />
        </div>
      </div>

      <div class="filter-footer">
        <button id="btnClearFilters" class="btn-clear">&#10005; Clear All Filters</button>
      </div>
    </section>

    <section class="grid" id="membersGrid">
      <div class="status">Loading data...</div>
    </section>
  </div>

  <div class="modal-backdrop" id="profileModal">
    <div class="modal-dialog">
      <button class="modal-close" id="modalCloseBtn">&times;</button>

      <div class="modal-header">
        <div class="modal-avatar">
          <img id="modalAvatar" src="" alt="Avatar" />
        </div>
        <div class="modal-info-primary">
          <h3 id="modalName">Name</h3>
          <p id="modalCompany" style="color:#2563eb; font-weight:500;">Company</p>
          <p id="modalEmail">Email</p>
          <p id="modalRole">Role</p>
          <p id="modalLocation">Location</p>
        </div>
      </div>

      <div class="modal-body">
        <div class="modal-section">
          <h4>Giới thiệu (Biography)</h4>
          <p id="modalBio" style="line-height:1.6;"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzw92Jq3QimCpARVl_4hajgBo7ZOCFKytJA2kNlI7CMza4RP_dOt24sZen2bg8bDJIO/exec";

    let ALL_MEMBERS = [];
    let PROFILE_DATA = {};

    const grid = document.getElementById("membersGrid");
    const visibleCountEl = document.getElementById("visibleCount");
    const totalCountEl = document.getElementById("totalCount");

    const filterName = document.getElementById("filterName");
    const filterRole = document.getElementById("filterRole");
    const filterCompany = document.getElementById("filterCompany");
    const filterLocation = document.getElementById("filterLocation");
    const btnClearFilters = document.getElementById("btnClearFilters");

    const modal = document.getElementById("profileModal");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalAvatar = document.getElementById("modalAvatar");
    const modalName = document.getElementById("modalName");
    const modalCompany = document.getElementById("modalCompany");
    const modalEmail = document.getElementById("modalEmail");
    const modalRole = document.getElementById("modalRole");
    const modalLocation = document.getElementById("modalLocation");
    const modalBio = document.getElementById("modalBio");

    function loadMembersJSONP() {
      const callbackName = "handleMembersResponse";
      const script = document.createElement("script");
      script.src = API_URL + "?callback=" + callbackName;
      script.async = true;

      script.onerror = function () {
        grid.innerHTML = '<div class="status">Không tải được dữ liệu từ Apps Script.</div>';
      };

      document.body.appendChild(script);
    }

    function handleMembersResponse(response) {
      if (!response || !response.success) {
        grid.innerHTML = '<div class="status">Dữ liệu trả về không hợp lệ.</div>';
        return;
      }

      ALL_MEMBERS = response.data || [];
      PROFILE_DATA = {};

      ALL_MEMBERS.forEach(member => {
        PROFILE_DATA[member.id] = member;
      });

      totalCountEl.textContent = ALL_MEMBERS.length;
      renderMembers(ALL_MEMBERS);
    }

    window.handleMembersResponse = handleMembersResponse;

    function renderMembers(memberList) {
      grid.innerHTML = "";

      if (!memberList.length) {
        grid.innerHTML = '<div class="status">Không tìm thấy thành viên nào.</div>';
        visibleCountEl.textContent = 0;
        return;
      }

      memberList.forEach(member => {
        const card = document.createElement("article");
        card.className = "member-card";

        card.innerHTML = `
          <div class="avatar-wrapper">
            <img src="${escapeHtml(member.avatar || "")}" alt="${escapeHtml(member.name || "")}" loading="lazy" />
          </div>
          <div class="member-name">${escapeHtml(member.name || "")}</div>
          <div class="member-company">${escapeHtml(member.company || "")}</div>
          <div class="member-title">${escapeHtml(member.role || "")}</div>
          <div class="member-location">${escapeHtml(member.location || "")}</div>
          <button class="btn-view" data-member-id="${escapeHtml(member.id || "")}">View Profile</button>
        `;

        grid.appendChild(card);
      });

      visibleCountEl.textContent = memberList.length;

      grid.querySelectorAll(".btn-view").forEach(btn => {
        btn.addEventListener("click", function () {
          openProfile(this.getAttribute("data-member-id"));
        });
      });
    }

    function applyFilters() {
      const nameTerm = filterName.value.trim().toLowerCase();
      const roleTerm = filterRole.value.trim().toLowerCase();
      const companyTerm = filterCompany.value.trim().toLowerCase();
      const locationTerm = filterLocation.value.trim().toLowerCase();

      const filtered = ALL_MEMBERS.filter(member => {
        const name = (member.name || "").toLowerCase();
        const role = (member.role || "").toLowerCase();
        const company = (member.company || "").toLowerCase();
        const location = (member.location || "").toLowerCase();

        return (
          name.includes(nameTerm) &&
          role.includes(roleTerm) &&
          company.includes(companyTerm) &&
          location.includes(locationTerm)
        );
      });

      renderMembers(filtered);
    }

    function clearFilters() {
      filterName.value = "";
      filterRole.value = "";
      filterCompany.value = "";
      filterLocation.value = "";
      renderMembers(ALL_MEMBERS);
    }

    function openProfile(id) {
      const data = PROFILE_DATA[id];
      if (!data) return;

      modalAvatar.src = data.avatar || "";
      modalName.textContent = data.name || "";
      modalCompany.textContent = data.company || "";
      modalEmail.textContent = data.email || "";
      modalRole.textContent = data.role || "";
      modalLocation.textContent = data.location || "";
      modalBio.innerHTML = escapeHtml(data.bio || "Chưa có thông tin giới thiệu.").replace(/\n/g, "<br>");

      modal.classList.add("active");
    }

    function closeModal() {
      modal.classList.remove("active");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    filterName.addEventListener("input", applyFilters);
    filterRole.addEventListener("input", applyFilters);
    filterCompany.addEventListener("input", applyFilters);
    filterLocation.addEventListener("input", applyFilters);
    btnClearFilters.addEventListener("click", clearFilters);

    modalCloseBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", function (e) {
      if (e.target === modal) closeModal();
    });

    loadMembersJSONP();
  </script>
</body>
</html>
