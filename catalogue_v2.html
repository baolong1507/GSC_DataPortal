<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Global Shapers – Participants Catalogue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-page: #f3f4f6;
      --page-bg: #ffffff;
      --accent: #0044a5;
      --accent-soft: #e5e7eb;
      --text-main: #111827;
      --text-sub: #6b7280;
      --table-head: #123f8c;
      --table-border: #d1d5db;
      --table-row: #f8fafc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      background: var(--bg-page);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(243, 244, 246, 0.95);
      backdrop-filter: blur(6px);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d1d5db;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
    }

    .toolbar button {
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 6px 14px;
      font-size: 0.9rem;
      background: #fff;
      cursor: pointer;
    }

    .toolbar button.primary {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .book {
      max-width: 900px;
      margin: 16px auto 40px;
      padding: 0 10px 30px;
    }

    .page {
      width: 794px;
      height: 1123px;
      margin: 16px auto;
      background: var(--page-bg);
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }

    .page.cover {
      color: #ffffff;
      background: #0044a5 !important;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.18);
    }

    .page.cover::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -22%;
      height: 55%;
      background: radial-gradient(circle at 50% 0, #0044a5 0, #00357f 40%, #001b4f 75%);
    }

    .page.cover::before {
      content: "";
      position: absolute;
      top: -20%;
      right: -35%;
      width: 80%;
      height: 80%;
      background: linear-gradient(135deg, #1d7ff5, #0067e0);
      transform: rotate(-12deg);
      opacity: 0.95;
    }

    .cover-inner {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 70px 70px 80px;
      display: flex;
      flex-direction: column;
    }

    .cover-header-logos {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 80px;
    }

    .cover-text-block {
      max-width: 460px;
    }

    .cover-small-title {
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .cover-main-title {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .cover-date {
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .cover-footer-tag {
      margin-top: auto;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .page-header-band {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: #ffffff;
    }

    .page-title-block {
      padding: 42px 56px 0;
    }

    .page-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    .page-title {
      font-size: 1.45rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .subcover {
      background: #ffffff;
      color: var(--text-main);
    }

    .subcover-content {
      padding: 60px 56px;
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: flex-start;
    }

    .subcover-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent-soft);
    }

    .subcover-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text-main);
      margin-bottom: 32px;
      flex: 1;
    }

    .subcover-text p {
      margin-bottom: 14px;
      text-align: justify;
    }

    .subcover-section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0057b8;
      margin-bottom: 10px;
    }

    .subcover-contact {
      background: var(--accent-soft);
      padding: 18px 18px;
      border-radius: 4px;
      margin-bottom: 32px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .subcover-contact p {
      margin: 0;
    }

    .subcover-footer {
      margin-top: auto;
      padding-top: 20px;
      font-size: 0.9rem;
      color: var(--text-sub);
    }

    .subcover-footer p {
      margin: 0;
    }

    .summary-page-content {
      padding: 24px 56px 78px;
      height: calc(100% - 150px);
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.8rem;
    }

    .summary-table thead th {
      background: var(--table-head);
      color: #fff;
      text-align: left;
      padding: 9px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .summary-table tbody td {
      border-bottom: 1px solid var(--table-border);
      padding: 8px 10px;
      vertical-align: top;
      line-height: 1.35;
      word-break: break-word;
    }

    .summary-table tbody tr:nth-child(even) td {
      background: var(--table-row);
    }

    .col-no { width: 6%; }
    .col-name { width: 32%; }
    .col-organization { width: 30%; }
    .col-year { width: 14%; }
    .col-hub { width: 18%; }

    .members-page {
      display: flex;
      flex-direction: column;
      gap: 32px;
      padding: 40px 56px 80px;
    }

    .member-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      column-gap: 22px;
      padding-top: 18px;
      padding-bottom: 18px;
      border-top: 1px solid #d4d4d4;
      position: relative;
      min-height: 430px;
    }

    .member-row::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #0067e0;
    }

    .member-left {
      font-size: 0.8rem;
      color: var(--text-sub);
    }

    .member-photo {
      width: 110px;
      height: 140px;
      object-fit: cover;
      margin-bottom: 8px;
      border: 1px solid #d4d4d4;
      background: #f8fafc;
    }

    .member-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #0057b8;
      margin-bottom: 2px;
    }

    .member-title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .member-country {
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    .member-tag,
    .member-centre {
      font-size: 0.78rem;
      margin-bottom: 2px;
    }

    .member-right {
      font-size: 0.86rem;
      line-height: 1.45;
      color: #111827;
      min-height: 390px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .org-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #0057b8;
      margin-bottom: 3px;
    }

    .org-tagline {
      font-size: 0.87rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .org-body {
      font-size: 0.84rem;
      text-align: justify;
      overflow: auto;
      padding-right: 6px;
      flex: 1;
      min-height: 0;
    }

    .org-body strong {
      font-weight: 700;
    }

    .org-body::-webkit-scrollbar {
      width: 6px;
    }

    .org-body::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    .page-footer {
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 24px;
      font-size: 0.78rem;
      color: var(--text-sub);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #e5e7eb;
      padding-top: 4px;
    }

    .summary-table tbody td:nth-child(2) {
      font-weight: 700;
    }

    .status-box {
      width: 794px;
      margin: 12px auto;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
      padding: 10px;
      color: #6b7280;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      html,
      body {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      .toolbar,
      .status-box {
        display: none !important;
      }

      .book {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .page {
        width: 210mm;
        height: 297mm;
        margin: 0;
        box-shadow: none;
        border-radius: 0;
        page-break-after: always;
        overflow: hidden;
      }

      .page:last-of-type {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-title">
      Global Shapers – Participants Catalogue
    </div>
    <div>
      <button onclick="window.location.href='index.html'">
        ← Back to Portal
      </button>
      <button class="primary" onclick="window.print()">
        Print / Save as PDF
      </button>
    </div>
  </div>

  <div id="statusBox" class="status-box">Loading data...</div>

  <main class="book" id="book">
    <section class="page cover">
      <div class="cover-inner">
        <div class="cover-header-logos">
          <div class="cover-logo-left">
            <img src="logos/gsc.png" alt="Global Shapers Community" height="120" />
          </div>
        </div>

        <div class="cover-text-block">
          <div class="cover-small-title">
            GLOBAL SHAPERS COMMUNITY
          </div>
          <div class="cover-main-title">
            Global Shapers HCMC<br/> Directory
          </div>
          <div class="cover-date" id="coverDate">
            LOADING...
          </div>
        </div>

        <div class="cover-footer-tag" id="coverFooterTag">
          Global Shapers HCMC Directory
        </div>
      </div>
    </section>
  </main>

  <template id="summaryPageTemplate">
    <section class="page">
      <div class="page-header-band"></div>
      <div class="page-title-block">
        <div class="page-eyebrow">Member Summary</div>
        <div class="page-title">Global Shapers HCMC Directory</div>
        <div class="page-subtitle">A quick reference to the Global Shapers HCMC community, highlighting members information across cohorts.</div>
      </div>
      <div class="summary-page-content">
        <table class="summary-table">
          <thead>
            <tr>
              <th class="col-no">No.</th>
              <th class="col-name">Name</th>
              <th class="col-organization">Organization</th>
              <th class="col-year">Shaper Since</th>
              <th class="col-hub">Hub</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <footer class="page-footer"></footer>
    </section>
  </template>

  <template id="subcoverPageTemplate">
    <section class="page subcover">
      <div class="subcover-content">
        <div class="subcover-title">About Global Shapers HCMC Directory</div>
        <div class="subcover-text">
          <p>The Global Shapers Community is an initiative of the World Economic Forum that brings together young leaders from around the world who are committed to shaping the future of their communities and the world. Global Shapers HCMC Hub is a part of the Global Shapers Community, a non-profit initiative of the World Economic Forum, consisting of inspiring young people working together to address local, regional and global challenges.</p>
          <p>This directory serves as a comprehensive reference guide to the members of the Global Shapers HCMC Hub, showcasing the diverse backgrounds, expertise, and contributions of our community members across multiple cohorts and organizations.</p>
        </div>
        <div class="subcover-contact">
          <div class="subcover-section-title">Contact Information</div>
          <p>For inquiries, collaborations, or more information about the Global Shapers HCMC Hub, please reach out through our official channels:</p>
          <!-- <p>     ➤ Facebook: Global Shapers Ho Chi Minh City Hub</p>
          <p>     ➤ Website: https://tinyurl.com/hcmcshapers</p>
          <p>     ➤ Email: ho-chi-minh-city@globalshapers.org</p> -->
          <p>➤ Facebook: <a href="https://www.facebook.com/GlobalShapersHCMC" target="_blank" rel="noopener noreferrer">Global Shapers Ho Chi Minh City Hub</a></p>
          <p>➤ Website: <a href="https://tinyurl.com/hcmcshapers" target="_blank" rel="noopener noreferrer">https://tinyurl.com/hcmcshapers</a></p>
          <p>
            ➤ Email:
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=globalshapershochiminhcity@gmail.com" target="_blank" rel="noopener noreferrer">
              globalshapershochiminhcity@gmail.com
            </a>
          </p>
        </div>
        <div class="subcover-footer">
          <p><em>Directory developed by: Pham Hoang Bao Long</em></p>
        </div>
      </div>
    </section>
  </template>

  <template id="memberPageTemplate">
    <section class="page">
      <div class="page-header-band"></div>
      <div class="members-page"></div>
      <footer class="page-footer"></footer>
    </section>
  </template>

  <template id="memberRowTemplate">
    <article class="member-row">
      <div class="member-left">
        <img src="" alt="" class="member-photo" />
        <div class="member-name"></div>
        <div class="member-title"></div>
        <div class="member-country"></div>
        <div class="member-tag"></div>
        <div class="member-centre"></div>
      </div>
      <div class="member-right">
        <h2 class="org-name"></h2>
        <div class="org-tagline"></div>
        <p class="org-body"></p>
      </div>
    </article>
  </template>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwbpyvKk_jie_h9PPLFJM7Do2HHCf0HjmLnaSu9vletAKKvOv4PcYX4ZjISPZTHYySJ/exec";
    const MEMBERS_PER_PAGE = 2;
    const SUMMARY_ROWS_PER_PAGE = 18;

    const statusBox = document.getElementById("statusBox");
    const book = document.getElementById("book");
    const coverDate = document.getElementById("coverDate");

    function loadMembersJSONP() {
      if (!API_URL || API_URL === "YOUR_APPS_SCRIPT_WEBAPP_URL") {
        statusBox.textContent = "Please set API_URL to your Apps Script Web App URL.";
        return;
      }

      const callbackName = "handleCatalogueMembersResponse";
      const script = document.createElement("script");
      script.src = API_URL + "?callback=" + callbackName;
      script.async = true;
      script.onerror = function () {
        statusBox.textContent = "Cannot load data from Apps Script.";
      };
      document.body.appendChild(script);
    }

    function handleCatalogueMembersResponse(response) {
      if (!response || !response.success || !Array.isArray(response.data)) {
        statusBox.textContent = "Invalid response from Apps Script.";
        return;
      }

      const members = response.data
        .filter(member => (member.name || "").trim() !== "")
        .map(normalizeMember)
        .sort(compareMembersByYearThenName);

      renderCover(members.length);
      renderAllPages(members);
      statusBox.classList.add("hidden");
    }

    window.handleCatalogueMembersResponse = handleCatalogueMembersResponse;

    function getDirectoryDateLabel() {
      const now = new Date();
      const month = now.toLocaleDateString("en-GB", { month: "long" });
      const year = now.toLocaleDateString("en-GB", { year: "numeric" });
      return `${month}, ${year}`;
    }

    function getFooterLabel(pageNumber) {
      return `Global Shapers HCMC Directory · ${getDirectoryDateLabel()} · Page ${pageNumber}`;
    }

    function renderCover(totalMembers) {
      const dateLabel = getDirectoryDateLabel();
      coverDate.textContent = dateLabel.toUpperCase();
      document.getElementById("coverFooterTag").textContent = `Global Shapers HCMC Directory`;
    }

    function renderAllPages(members) {
      document.querySelectorAll("main.book .page:not(.cover)").forEach(page => page.remove());

      if (!members.length) {
        statusBox.textContent = "No members found.";
        statusBox.classList.remove("hidden");
        return;
      }

      let pageNumber = 2;

      // Render subcover page
      const subcoverPage = createSubcoverPage();
      book.appendChild(subcoverPage);
      pageNumber += 1;

      const summaryChunks = chunkArray(members, SUMMARY_ROWS_PER_PAGE);
      summaryChunks.forEach((chunk, index) => {
        const page = createSummaryPage(chunk, index * SUMMARY_ROWS_PER_PAGE, pageNumber);
        book.appendChild(page);
        pageNumber += 1;
      });

      const memberChunks = chunkArray(members, MEMBERS_PER_PAGE);
      memberChunks.forEach(chunk => {
        const page = createMemberPage(chunk, pageNumber);
        book.appendChild(page);
        pageNumber += 1;
      });
    }

    function createSubcoverPage() {
      const tpl = document.getElementById("subcoverPageTemplate");
      const fragment = tpl.content.cloneNode(true);
      const pageEl = fragment.querySelector(".page");
      
      return pageEl;
    }

    function createSummaryPage(members, startIndex, pageNumber) {
      const tpl = document.getElementById("summaryPageTemplate");
      const fragment = tpl.content.cloneNode(true);
      const pageEl = fragment.querySelector(".page");
      const tbody = fragment.querySelector("tbody");
      const footerEl = fragment.querySelector(".page-footer");

      members.forEach((member, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${startIndex + idx + 1}.</td>
          <td>${escapeHtml(member.name || "-")}</td>
          <td>${escapeHtml(member.organization || "-")}</td>
          <td>${escapeHtml(displayYear(member.yearBecomeShaper))}</td>
          <td>${escapeHtml(member.hub || "-")}</td>
        `;
        tbody.appendChild(tr);
      });

      footerEl.innerHTML = `<span>Global Shapers HCMC Directory · ${getDirectoryDateLabel()}</span><span>Page ${pageNumber}</span>`;
      return pageEl;
    }

    function createMemberPage(members, pageNumber) {
      const pageTemplate = document.getElementById("memberPageTemplate");
      const pageFragment = pageTemplate.content.cloneNode(true);
      const pageEl = pageFragment.querySelector(".page");
      const membersPageEl = pageFragment.querySelector(".members-page");
      const footerEl = pageFragment.querySelector(".page-footer");

      members.forEach(member => {
        membersPageEl.appendChild(createMemberRow(member));
      });

      footerEl.innerHTML = `<span>Global Shapers HCMC Directory · ${getDirectoryDateLabel()}</span><span>Page ${pageNumber}</span>`;
      return pageEl;
    }

    function createMemberRow(member) {
      const rowTemplate = document.getElementById("memberRowTemplate");
      const rowFragment = rowTemplate.content.cloneNode(true);
      const row = rowFragment.querySelector(".member-row");

      const photo = row.querySelector(".member-photo");
      photo.src = member.avatar || "https://via.placeholder.com/110x140?text=No+Image";
      photo.alt = member.name || "Member photo";

      row.querySelector(".member-name").innerHTML = formatName(member.name || "");
      row.querySelector(".member-title").textContent = member.role || "-";
      row.querySelector(".member-country").textContent = member.location || member.hub || "-";
      row.querySelector(".member-tag").innerHTML = `Year become shaper: ${escapeHtml(displayYear(member.yearBecomeShaper))}<br>${escapeHtml(member.hub || "HCMC Hub")}`;
      row.querySelector(".member-centre").innerHTML = `<br>${escapeHtml(getFocusArea(member))}`;

      row.querySelector(".org-name").textContent = member.company || "Independent";
      row.querySelector(".org-tagline").textContent = buildTagline(member);

      const bioHtml = escapeHtml(member.bio || "No biography available.").replace(/\n/g, "<br>");
      row.querySelector(".org-body").innerHTML = `<strong>Profile:</strong> ${bioHtml}`;

      return row;
    }

    function normalizeMember(member) {
      return {
        ...member,
        yearBecomeShaper: extractYearBecomeShaper(member),
        hub: extractHub(member),
        organization: extractOrganization(member)
      };
    }

    function extractYearBecomeShaper(member) {
      const candidates = [
        member.yearBecomeShaper,
        member.year_become_shaper,
        member.yearBecameShaper,
        member.shaperYear,
        member.year,
        member.cohortYear,
        member.becameShaperYear
      ];

      for (const value of candidates) {
        const year = parseYear(value);
        if (year !== null) return year;
      }
      return null;
    }

    function extractHub(member) {
      const candidates = [
        member.hub,
        member.hubName,
        member.hub_name,
        member.location,
        member.cityHub
      ];

      for (const value of candidates) {
        const text = String(value || "").trim();
        if (text) return text;
      }
      return "HCMC Hub";
    }

    function extractOrganization(member) {
      const candidates = [
        member.organization,
        member.organisation,
        member.company,
        member.companyName,
        member.org,
        member.orgName,
        member.employer
      ];

      for (const value of candidates) {
        const text = String(value || "").trim();
        if (text) return text;
      }
      return "Independent";
    }

    function parseYear(value) {
      if (value === null || value === undefined || value === "") return null;
      const text = String(value).trim();
      const match = text.match(/(19|20)\d{2}/);
      if (!match) return null;
      const year = Number(match[0]);
      return Number.isFinite(year) ? year : null;
    }

    function displayYear(year) {
      return year || "-";
    }

    function compareMembersByYearThenName(a, b) {
      const ay = a.yearBecomeShaper ?? 9999;
      const by = b.yearBecomeShaper ?? 9999;
      if (ay !== by) return ay - by;
      return (a.name || "").localeCompare(b.name || "");
    }

    function formatName(name) {
      const safe = escapeHtml(name || "");
      const parts = safe.split(/\s+/).filter(Boolean);
      if (parts.length >= 3) {
        const mid = Math.ceil(parts.length / 2);
        return parts.slice(0, mid).join(" ") + "<br>" + parts.slice(mid).join(" ");
      }
      return safe;
    }

    function getFocusArea(member) {
      const parts = [member.role, member.company]
        .map(v => (v || "").trim())
        .filter(Boolean);
      return parts.join(" · ") || "Community Member";
    }

    function buildTagline(member) {
      const parts = [member.role, member.company, member.hub || member.location]
        .map(v => (v || "").trim())
        .filter(Boolean);
      return parts.join(" · ") || "Global Shapers HCMC member";
    }

    function chunkArray(arr, size) {
      const out = [];
      for (let i = 0; i < arr.length; i += size) {
        out.push(arr.slice(i, i + size));
      }
      return out;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadMembersJSONP();
  </script>
</body>
</html>
